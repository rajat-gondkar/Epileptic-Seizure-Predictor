version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: eeg_fusion_db
    environment:
      POSTGRES_DB: eeg_fusion
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    container_name: eeg_fusion_api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./models:/app/models
    environment:
      DATABASE_URL: "postgresql://user:pass@postgres:5432/eeg_fusion"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/dashboard
      dockerfile: Dockerfile
    container_name: eeg_fusion_frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
